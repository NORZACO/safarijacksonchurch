{% extends 'bloge/partials/base.html' %}
{% load static %}

{% block main_content %}

<section class="position-relative overflow-hidden" style="height:80vh;">

    <!-- Background Video -->
    <video autoplay muted loop playsinline
        class="position-absolute w-100 h-100"
        style="object-fit:cover; z-index:-2;">
        <source src="{% static 'bloge/images/church.mp4' %}" type="video/mp4">
    </video>

    <!-- Dark overlay -->
    <div class="position-absolute w-100 h-100"
        style="background:rgba(0,0,0,0.55); z-index:-1;"></div>

    <!-- Content -->
    <div class="container h-100 d-flex align-items-center justify-content-center text-center text-white">

        <div class="col-lg-8">

            <h1 class="display-4 fw-bold mb-3">
                The Good News
            </h1>

            <p class="lead mb-4">
                Discover faith, community, and hope.
                Learn more about the message of life and spiritual encouragement
                shared through our church.
            </p>

            <div class="d-flex justify-content-center gap-3">

                <a href="#" class="btn btn-primary btn-lg px-4">
                    <i class="bi bi-play-circle me-2"></i>
                    Watch Message
                </a>

                <a href="#" class="btn btn-outline-light btn-lg px-4">
                    Learn More
                </a>

            </div>

        </div>

    </div>

</section>

{% endblock main_content %}
