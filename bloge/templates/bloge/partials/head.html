<!-- views/partials/head.ejs -->
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <!-- Mobile responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Title & Description -->
  <!-- <title><%= locals.title || 'Norzaco - Full Stack Developer Portfolio' %></title> -->
  <meta name="description" content="<%= description || 'Explore the professional portfolio of Norzaco, a backend developer specializing in Node.js, Express, and scalable APIs.' %>">

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="<%= url || 'https://www.norzaco.dev' %>">
  <meta property="og:title" content="<%= title || 'Norzaco - Full Stack Developer Portfolio' %>">
  <meta property="og:description" content="<%= description || 'Explore Norzaco’s work in modern web backend development.' %>">
  <meta property="og:image" content="<%= image || 'https://www.norzaco.dev/preview.jpg' %>">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="<%= url || 'https://www.norzaco.dev' %>">
  <meta name="twitter:title" content="<%= title || 'Norzaco - Full Stack Developer Portfolio' %>">
  <meta name="twitter:description" content="<%= description || 'Explore Norzaco’s backend projects and web development skills.' %>">
  <meta name="twitter:image" content="<%= image || 'https://www.norzaco.dev/preview.jpg' %>">

  <!-- Canonical URL -->
  <link rel="canonical" href="<%= url || 'https://www.norzaco.dev' %>">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">
